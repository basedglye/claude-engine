name: CI

on:
  push:
    branches: [main, phase-1]
  pull_request:
    branches: [main, phase-1]

jobs:
  ci:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [22.x]

    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Lint
        run: npm run lint

      - name: Check purity
        run: npm run check:purity

      - name: Test (smoke)
        run: npm test

      - name: Harness smoke scenario
        run: npm run harness --silent -- smoke
